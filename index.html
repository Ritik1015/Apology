<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:cursive;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#0b1028,#24123b);
overflow:hidden;
color:white;
text-align:center;
}

.container{
z-index:2;
padding:20px;
}

img{
width:250px;
border-radius:20px;
}

h1{
margin-top:20px;
font-size:32px;
}

p{
margin-top:15px;
font-size:22px;
line-height:1.6;
}

button{
margin-top:25px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
}

.heart{
position:absolute;
color:pink;
font-size:20px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-100vh);
opacity:1;
}
}
</style>
</head>

<body>

<div class="container">

<img src="https://media.tenor.com/l0J9YvN8lJAAAAAC/cute-bear.gif">

<h1>I'm Sorry ❤️</h1>

<p>
I don't need anything fancy right now...<br><br>
Just your arms around me,<br>
that's all I want. 💕
</p>

<button onclick="hug()">Send a Hug 🤗</button>

</div>

<script>

function hug(){
alert("Thank You For The Hug ❤️🥺");
}

for(let i=0;i<40;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=
(Math.random()*5+4)+"s";

document.body.appendChild(heart);
}

</script>

</body>
</html>
